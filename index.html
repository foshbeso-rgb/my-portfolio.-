<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
    <meta charset="UTF-8">
    <title>السيرة الذاتية - فؤاد عباس فؤاد</title>
    <style>
        :root { --primary-gold: #c5a059; --dark-blue: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f4f4; padding: 20px; line-height: 1.6; }
        .cv-card { max-width: 850px; margin: auto; background: #ffffff; padding: 50px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-right: 10px solid var(--primary-gold); }
        .lang-switch { text-align: center; margin-bottom: 30px; }
        button { padding: 10px 25px; cursor: pointer; border: 1px solid var(--primary-gold); background: white; border-radius: 5px; font-weight: bold; transition: 0.3s; margin: 0 5px; }
        button:hover { background: var(--primary-gold); color: white; }
        h1 { color: var(--dark-blue); text-align: center; margin-bottom: 5px; }
        .contact-bar { text-align: center; color: #666; margin-bottom: 40px; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        h2 { color: var(--primary-gold); border-bottom: 2px solid var(--primary-gold); padding-bottom: 5px; margin-top: 25px; font-size: 1.25em; text-transform: uppercase; }
        .item { margin-bottom: 15px; }
        .item b { color: var(--dark-blue); }
    </style>
</head>
<body>

<div class="cv-card">
    <div class="lang-switch">
        <button onclick="updatePage('ar')">العربية</button>
        <button onclick="updatePage('en')">English</button>
    </div>

    <h1 id="name">فؤاد عباس فؤاد</h1>
    <div class="contact-bar" id="contact">foshbeso@gmail.com | 01010169726</div>

    <div class="grid">
        <div>
            <h2 id="exp-title">الخبرات المهنية</h2>
            <div id="exp-list" class="item"></div>
            <h2 id="edu-title">التعليم</h2>
            <div id="edu-list" class="item"></div>
        </div>
        <div>
            <h2 id="certs-title">التدريبات والشهادات</h2>
            <div id="certs-list" class="item"></div>
            <h2 id="skills-title">المهارات واللغات</h2>
            <div id="skills-list" class="item"></div>
        </div>
    </div>
</div>

<script>

        certs: "التدريبات والشهادات",
        certsList: "• Oracle DB Administration<br>• Three-year industrial professional diploma<br>• CTC (إدارة مشروعات)<br>• It Shark (قواعد بيانات)<br>• Mini-MBA | مراسل (أخبار العالم)",

    },
    en: {
        name: "Fouad Abbas Fouad",
        exp: "Professional Experience",
        expList: "• <b>External Sales & Marketing Officer</b>: Taiba Trading (2015-2020)<br>• <b>Marketing Specialist</b>: It Academy (2017-2018)<br>• <b>Assistant Chef</b>: Chef Sarhan (2017-2019)<br>• <b>Marketing & CS</b>: Int. Academy (2016)<br>• <b>Outdoor Sales</b>: Taiba Audio (2016)<br>• <b>Foreman Clerk</b>: Nile Gas (2014-2015)",

    }

function updatePage(lang) {
    document.getElementById('html-root').lang = lang;
    document.getElementById('html-root').dir = (lang === 'ar') ? 'rtl' : 'ltr';
    document.getElementById('name').innerText = data[lang].name;
    document.getElementById('exp-title').innerText = data[lang].exp;
    document.getElementById('exp-list').innerHTML = data[lang].expList;
    document.getElementById('edu-title').innerText = data[lang].edu;
    document.getElementById('edu-list').innerHTML = data[lang].eduList;
    document.getElementById('certs-title').innerText = data[lang].certs;
    document.getElementById('certs-list').innerHTML = data[lang].certsList;
    document.getElementById('skills-title').innerText = data[lang].skills;
    document.getElementById('skills-list').innerHTML = data[lang].skillsList;
}
updatePage('ar');
</script>
</body>
</html>
