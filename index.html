<!DOCTYPE html>
<html lang="ar" dir="rtl" id="cv-html">
<head>
    <meta charset="UTF-8">
    <style>
        /* التنسيقات السابقة كما هي، أضفنا لها تنسيق الأزرار */
        .controls { text-align: center; margin-bottom: 20px; }
        .btn { padding: 10px 20px; cursor: pointer; background: #c5a059; border: none; color: white; border-radius: 4px; }
        /* ... باقي التنسيقات ... */
    </style>
</head>
<body>

<div class="controls">
    <button class="btn" onclick="toggleLang()">Switch to English / تغيير للغة العربية</button>
    <button class="btn" onclick="window.print()">Download PDF / تحميل نسخة</button>
</div>

<!-- محتوى الـ CV هنا (بنفس الهيكل السابق) -->

<script>
    function toggleLang() {
        const html = document.getElementById('cv-html');
        if (html.dir === "rtl") {
            html.dir = "ltr";
            html.lang = "en";
            // هنا يمكنك إضافة منطق استبدال النصوص بالعربية إلى الإنجليزية
            alert("This will switch content to English (requires full translation content)");
        } else {
            html.dir = "rtl";
            html.lang = "ar";
        }
    }
</script>
</body>
</html>
