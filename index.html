<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
    <meta charset="UTF-8">
    <title>السيرة الذاتية | فؤاد عباس فؤاد</title>
    <style>
        :root { --accent: #C5A059; --dark: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; padding: 40px; }
        .page { max-width: 900px; margin: auto; background: white; padding: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 8px; }
        .lang-switch { text-align: center; margin-bottom: 30px; }
        button { padding: 10px 25px; cursor: pointer; background: var(--dark); color: white; border: none; border-radius: 4px; font-weight: bold; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; }
        h2 { color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 5px; margin-top: 30px; font-size: 1.2em; }
        .item { margin-bottom: 15px; line-height: 1.6; }
    </style>
</head>
<body>
<div class="page">
    <div class="lang-switch">
        <button onclick="updatePage('ar')">العربية</button>
        <button onclick="updatePage('en')">English</button>
    </div>

    <div style="text-align: center; border-bottom: 2px solid #eee; padding-bottom: 20px;">
        <h1 id="name">فؤاد عباس فؤاد</h1>
        <p>01010169726 | foshbeso@gmail.com</p>
    </div>

    <div class="container">
        <div>
            <h2 id="exp-title">الخبرات المهنية</h2>
            <div id="exp-list" class="item"></div>
            <h2 id="edu-title">التعليم والتدريب</h2>
            <div id="edu-list" class="item"></div>
        </div>
        <div>
            <h2 id="skills-title">المهارات التقنية</h2>
            <div id="skills-list" class="item"></div>
            <h2 id="projects-title">المشاريع</h2>
            <div id="projects-list" class="item"></div>
        </div>
    </div>
</div>

<script>
const data = {
    ar: { name: "فؤاد عباس فؤاد", exp: "الخبرات المهنية", expList: "• كاتب فورمان - النيل للغاز (2014-2015)<br>• مساعد طباخ - الشيف سرحان (2017-2019)<br>• تسويق وخدمة عملاء - الأكاديمية الدولية (2016)<br>• مبيعات خارجية - طيبة للسمعيات (2016)", edu: "التعليم والتدريب", eduList: "• دبلوم صناعي - إلكترونيات (2010)<br>• CTC (إدارة مشروعات) | It Shark (قواعد بيانات) | Mini-MBA", skills: "المهارات التقنية", skillsList: "• Full-Stack: Flutter, Python, Django, Flask<br>• Database: Oracle DB, SQL<br>• Systems: MS Office (Expert), Data Entry", projects: "المشاريع", projectsList: "• Jarvis: مساعد صوتي ذكي.<br>• E-commerce: منصة تجارة إلكترونية." },
    en: { name: "Fouad Abbas Fouad", exp: "Professional Experience", expList: "• Foreman Clerk - Nile Gas (2014-2015)<br>• Assistant Chef - Chef Sarhan (2017-2019)<br>• Marketing & CS - Int. Academy (2016)<br>• Outdoor Sales - Taiba Audio (2016)", edu: "Education & Training", eduList: "• Industrial Diploma - Electronics (2010)<br>• CTC (Project Mgmt) | It Shark (DB) | Mini-MBA", skills: "Technical Skills", skillsList: "• Full-Stack: Flutter, Python, Django, Flask<br>• Database: Oracle DB, SQL<br>• Systems: MS Office (Expert), Data Entry", projects: "Projects", projectsList: "• Jarvis: AI Voice Assistant.<br>• E-commerce: Full-stack Platform." }
};

function updatePage(lang) {
    document.getElementById('html-root').lang = lang;
    document.getElementById('html-root').dir = (lang === 'ar') ? 'rtl' : 'ltr';
    document.getElementById('name').innerHTML = data[lang].name;
    document.getElementById('exp-title').innerHTML = data[lang].exp;
    document.getElementById('exp-list').innerHTML = data[lang].expList;
    document.getElementById('edu-title').innerHTML = data[lang].edu;
    document.getElementById('edu-list').innerHTML = data[lang].eduList;
    document.getElementById('skills-title').innerHTML = data[lang].skills;
    document.getElementById('skills-list').innerHTML = data[lang].skillsList;
    document.getElementById('projects-title').innerHTML = data[lang].projects;
    document.getElementById('projects-list').innerHTML = data[lang].projectsList;
}
// تحميل اللغة الافتراضية
updatePage('ar');
</script>
</body>
</html>
