<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
    <meta charset="UTF-8">
    <title>السيرة الذاتية | فؤاد عباس فؤاد</title>
    <style>
        :root { --accent: #2c3e50; --gold: #c5a059; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f2f5; color: #333; padding: 20px; }
        .cv-card { max-width: 900px; margin: auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 8px solid var(--gold); }
        .lang-switch { text-align: center; margin-bottom: 25px; }
        .lang-switch button { padding: 8px 20px; cursor: pointer; border: none; background: var(--accent); color: #fff; border-radius: 5px; margin: 0 5px; font-weight: bold; transition: 0.3s; }
        .lang-switch button:hover { background: var(--gold); }
        h1 { color: var(--accent); margin-bottom: 5px; }
        .contact { color: #666; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        h2 { color: var(--gold); border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 30px; font-size: 1.4em; }
        .item { margin-bottom: 12px; font-size: 0.95em; }
        .item b { color: #222; }
    </style>
</head>
<body>

<div class="cv-card">
    <div class="lang-switch">
        <button onclick="updatePage('ar')">العربية</button>
        <button onclick="updatePage('en')">English</button>
    </div>

    <div style="text-align: center;">
        <h1 id="name">فؤاد عباس فؤاد</h1>
        <p class="contact" id="contact">01010169726 | foshbeso@gmail.com</p>
    </div>

    <div class="grid">
        <div>
            <h2 id="exp-title">الخبرات المهنية</h2>
            <div id="exp-list" class="item"></div>
            <h2 id="edu-title">التعليم والتدريب</h2>
            <div id="edu-list" class="item"></div>
        </div>
        <div>
            <h2 id="skills-title">المهارات التقنية</h2>
            <div id="skills-list" class="item"></div>
            <h2 id="projects-title">المشاريع</h2>
            <div id="projects-list" class="item"></div>
        </div>
    </div>
</div>

<script>
const data = {
    ar: { name: "فؤاد عباس فؤاد", exp: "الخبرات المهنية", expList: "• <b>كاتب فورمان - النيل للغاز</b> (2014-2015)<br>• <b>مساعد طباخ - الشيف سرحان</b> (2017-2019)<br>• <b>تسويق وخدمة عملاء - الأكاديمية الدولية</b> (2016)<br>• <b>مبيعات خارجية - طيبة للسمعيات</b> (2016)", edu: "التعليم والتدريب", eduList: "• <b>دبلوم صناعي - إلكترونيات</b> (2010)<br>• <b>إدارة مشروعات</b> (CTC)<br>• <b>قواعد بيانات</b> (It Shark)<br>• <b>Mini-MBA</b> | مراسل (أخبار العالم)", skills: "المهارات التقنية", skillsList: "• <b>Full-Stack:</b> Flutter, Python, Django, Flask<br>• <b>Database:</b> Oracle DB, SQL<br>• <b>Systems:</b> MS Office (Expert), Data Entry", projects: "المشاريع", projectsList: "• <b>Jarvis:</b> مساعد صوتي ذكي.<br>• <b>E-commerce:</b> منصة تجارة إلكترونية متكاملة." },
    en: { name: "Fouad Abbas Fouad", exp: "Professional Experience", expList: "• <b>Foreman Clerk - Nile Gas</b> (2014-2015)<br>• <b>Assistant Chef - Chef Sarhan</b> (2017-2019)<br>• <b>Marketing & CS - Int. Academy</b> (2016)<br>• <b>Outdoor Sales - Taiba Audio</b> (2016)", edu: "Education & Training", eduList: "• <b>Industrial Diploma - Electronics</b> (2010)<br>• <b>Project Management</b> (CTC)<br>• <b>Databases</b> (It Shark)<br>• <b>Mini-MBA</b> | Journalist (Akhbar El Alam)", skills: "Technical Skills", skillsList: "• <b>Full-Stack:</b> Flutter, Python, Django, Flask<br>• <b>Database:</b> Oracle DB, SQL<br>• <b>Systems:</b> MS Office (Expert), Data Entry", projects: "Projects", projectsList: "• <b>Jarvis:</b> AI Voice Assistant.<br>• <b>E-commerce:</b> Full-stack E-commerce Platform." }
};

function updatePage(lang) {
    document.getElementById('html-root').lang = lang;
    document.getElementById('html-root').dir = (lang === 'ar') ? 'rtl' : 'ltr';
    document.getElementById('name').innerHTML = data[lang].name;
    document.getElementById('exp-title').innerHTML = data[lang].exp;
    document.getElementById('exp-list').innerHTML = data[lang].expList;
    document.getElementById('edu-title').innerHTML = data[lang].edu;
    document.getElementById('edu-list').innerHTML = data[lang].eduList;
    document.getElementById('skills-title').innerHTML = data[lang].skills;
    document.getElementById('skills-list').innerHTML = data[lang].skillsList;
    document.getElementById('projects-title').innerHTML = data[lang].projects;
    document.getElementById('projects-list').innerHTML = data[lang].projectsList;
}
updatePage('ar');
</script>
</body>
</html>
