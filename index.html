<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
    <meta charset="UTF-8">
    <title>السيرة الذاتية الاحترافية | فؤاد عباس فؤاد</title>
    <style>
        :root { --gold: #c5a059; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; padding: 20px; }
        .cv-card { max-width: 950px; margin: auto; background: white; padding: 50px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { color: var(--gold); border-bottom: 2px solid var(--gold); padding-bottom: 10px; margin-top: 30px; }
        .job-card { margin-bottom: 25px; border-right: 3px solid var(--gold); padding-right: 15px; }
        .job-title { font-weight: bold; color: var(--dark); font-size: 1.1em; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        button { padding: 8px 20px; cursor: pointer; border: 1px solid var(--gold); background: white; border-radius: 5px; }
    </style>
</head>
<body>

<div class="cv-card">
    <div style="text-align:center;">
        <h1 id="name">فؤاد عباس فؤاد</h1>
        <p>foshbeso@gmail.com | 01010169726</p>
        <button onclick="updatePage('ar')">العربية</button>

function updatePage(lang) {
    document.getElementById('name').innerText = data[lang].name;

    document.getElementById('exp-list').innerHTML = data[lang].expList;
    document.getElementById('certs-title').innerText = data[lang].certs;

}
updatePage('ar');

</body>
</html>
