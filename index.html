<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">
<head>
    <meta charset="UTF-8">
    <title>السيرة الذاتية الاحترافية | فؤاد عباس فؤاد</title>
    <style>
        :root { --gold: #b38b59; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f4f4; padding: 20px; color: #333; }
        .cv-card { max-width: 900px; margin: auto; background: white; padding: 50px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header-section { text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 20px; margin-bottom: 30px; }
        .contact-info { display: flex; justify-content: center; gap: 20px; font-size: 0.9em; color: #555; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        h2 { color: var(--gold); border-bottom: 1px solid #ddd; padding-bottom: 10px; font-size: 1.2em; margin-top: 25px; }
        .item { margin-bottom: 15px; line-height: 1.6; }
        .lang-switch { text-align: center; margin-bottom: 20px; }
        button { padding: 8px 20px; cursor: pointer; border: 1px solid var(--gold); background: white; border-radius: 5px; transition: 0.3s; }
        button:hover { background: var(--gold); color: white; }
    </style>
</head>
<body>

<div class="cv-card">
    <div class="lang-switch">
        <button onclick="updatePage('ar')">العربية</button>
        <button onclick="updatePage('en')">English</button>
    </div>

    <div class="header-section">
        <h1 id="name">فؤاد عباس فؤاد</h1>
        <div class="contact-info">
            <span>📞 01010169726</span>
            <span>✉️ foshbeso@gmail.com</span>
            <span>📍 Sharm El Sheikh</span>
        </div>
    </div>

    <div class="grid">
        <div>
            <h2 id="exp-title">الخبرات المهنية</h2>
            <div id="exp-list" class="item"></div>
            <h2 id="projects-title">المشاريع التقنية</h2>
            <div id="projects-list" class="item"></div>
        </div>
        <div>
            <h2 id="skills-title">المهارات واللغات</h2>
            <div id="skills-list" class="item"></div>
            <h2 id="edu-title">التعليم والشهادات</h2>
            <div id="edu-list" class="item"></div>
        </div>
    </div>
</div>

<script>
const data = {
    ar: {
        name: "فؤاد عباس فؤاد",
        exp: "الخبرات المهنية",
        expList: "• <b>External Sales & Marketing Officer</b> - طيبة للتجارة (2015-2020)<br>• <b>Marketing Specialist</b> - It Academy (2017-2018)<br>• <b>مساعد طباخ</b> - الشيف سرحان (2017-2019)<br>• <b>كاتب فورمان</b> - النيل للغاز (2014-2015)",
        projects: "المشاريع التقنية",
        projectsList: "• <b>Jarvis Assistant:</b> نظام مساعد صوتي ذكي باستخدام Python.<br>• <b>E-commerce Platform:</b> تطبيق تجارة إلكترونية متكامل (Flutter).<br>• <b>Systems:</b> صيانة وإدارة خوادم محلية وتنظيم قواعد بيانات.",
        skills: "المهارات واللغات",
        skillsList: "• <b>تقني:</b> Flutter, Python, Django, SQL, MS Office (ممتاز).<br>• <b>مهارات حياتية:</b> إدخال بيانات، سكرتارية، علاقات عامة، تنقل مرن.<br>• <b>اللغات:</b> العربية (الأم)، الإنجليزية (جيد).",
        edu: "التعليم والشهادات",
        eduList: "• دبلوم صناعي - إلكترونيات (2010).<br>• Oracle DB Administration & CTC Project Mgmt.<br>• It Shark Database Training."
    },
    en: {
        name: "Fouad Abbas Fouad",
        exp: "Professional Experience",
        expList: "• <b>External Sales & Marketing Officer</b> - Taiba Trading (2015-2020)<br>• <b>Marketing Specialist</b> - It Academy (2017-2018)<br>• <b>Assistant Chef</b> - Chef Sarhan (2017-2019)<br>• <b>Foreman Clerk</b> - Nile Gas (2014-2015)",
        projects: "Technical Projects",
        projectsList: "• <b>Jarvis Assistant:</b> AI Voice-controlled system (Python).<br>• <b>E-commerce Platform:</b> Full-stack mobile application (Flutter).<br>• <b>Systems:</b> Local server management & DB optimization.",
        skills: "Skills & Languages",
        skillsList: "• <b>Technical:</b> Flutter, Python, Django, SQL, MS Office (Expert).<br>• <b>Soft Skills:</b> Data Entry, Admin, PR, Willing to relocate.<br>• <b>Languages:</b> Arabic (Native), English (Good).",
        edu: "Education & Certificates",
        eduList: "• Industrial Diploma - Electronics (2010).<br>• Oracle DB Administration & CTC Project Mgmt.<br>• It Shark Database Training."
    }
};

function updatePage(lang) {
    document.getElementById('html-root').lang = lang;
    document.getElementById('html-root').dir = (lang === 'ar') ? 'rtl' : 'ltr';
    document.getElementById('name').innerText = data[lang].name;
    document.getElementById('exp-title').innerText = data[lang].exp;
    document.getElementById('exp-list').innerHTML = data[lang].expList;
    document.getElementById('projects-title').innerText = data[lang].projects;
    document.getElementById('projects-list').innerHTML = data[lang].projectsList;
    document.getElementById('skills-title').innerText = data[lang].skills;
    document.getElementById('skills-list').innerHTML = data[lang].skillsList;
    document.getElementById('edu-title').innerText = data[lang].edu;
    document.getElementById('edu-list').innerHTML = data[lang].eduList;
}
updatePage('ar');
</script>
</body>
</html>
