<!DOCTYPE html>
<html lang="ar" dir="rtl" id="html-root">

        h1 { color: var(--accent); margin-bottom: 5px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        h2 { color: var(--gold); border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 30px; font-size: 1.3em; }
        .item { margin-bottom: 10px; line-height: 1.6; font-size: 0.95em; }
    </style>
</head>
<body>
